<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chromebook Test</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/keyboard.css" />
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌗</button>

  <div id="overlay" class="overlay" style="display:flex">
    <div class="overlay-card">
      <h2>Permissions Required</h2>
      <p>This page needs access to the camera and microphone.</p>
      <button id="force-permissions">Allow camera &amp; mic</button>
    </div>
  </div>

  <div class="grid">
    <section class="card audio-card">
      <h2 class="card-title">Audio Test</h2>
      <video id="audio-video" preload="auto" controls playsinline></video>
      <div class="controls">
        <button id="audio-play">Play</button>
        <button id="audio-stop">Stop</button>
      </div>
    </section>

    <section class="card mic-card">
      <h2 class="card-title">Microphone</h2>
      <canvas id="mic-canvas" width="600" height="160"></canvas>
    </section>

    <section class="card cam-card">
      <h2 class="card-title">Camera</h2>
      <video id="cam-video" autoplay playsinline muted></video>
    </section>

    <section class="card keyboard-card">
      <h2 class="card-title card-title-left">Keyboard Test</h2>
      <div id="keyboard" class="keyboard-container" aria-hidden="false"></div>
    </section>

    <section class="card battery-card">
      <h2 class="card-title">Battery Test</h2>
      <div id="battery-info" class="battery-info">
        <div class="battery-row">
          <div class="battery-icon" id="battery-icon" aria-hidden="true"></div>
          <div>
            <div>State: <span id="battery-status">—</span></div>
            <div>Level: <span id="battery-level">—</span></div>
            <div>Estimated time: <span id="battery-time">—</span></div>
          </div>
        </div>
      </div>
      <div class="battery-controls" style="margin-top:8px;">
        <button id="battery-refresh">Refresh</button>
      </div>
    </section>
  </div>

  <div class="watermark">Created by Flemidra</div>

  <!-- JS -->
  <script defer src="js/theme.js"></script>
  <script defer src="js/permissions.js"></script>
  <script defer src="js/safeplay.js"></script>
  <script defer src="js/microphone.js"></script>
  <script defer src="js/camera.js"></script>
  <script defer src="js/audio.js"></script>
  <script defer src="js/keyboard.js"></script>
  <script defer src="js/battery.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // audio controls
      const playBtn = document.getElementById('audio-play');
      const stopBtn = document.getElementById('audio-stop');
      const audioVideo = document.getElementById('audio-video');
      if (audioVideo) {
        if (audioVideo.safeSetSrc) audioVideo.safeSetSrc('assets/media/test.mp4');
        else audioVideo.src = 'assets/media/test.mp4';
      }
      if (playBtn) playBtn.onclick = () => {
        if (window.safePlayVideo) window.safePlayVideo();
        else audioVideo.play().catch(()=>{});
      };
      if (stopBtn) stopBtn.onclick = () => {
        if (audioVideo) { audioVideo.pause(); audioVideo.currentTime = 0; }
      };

      // keyboard helpers removed from UI (utilities remain available in console)
      // battery refresh
      const batteryRefresh = document.getElementById('battery-refresh');
      if (batteryRefresh) batteryRefresh.onclick = () => {
        if (window.initBattery) window.initBattery();
      };

      // theme toggle
      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.onclick = () => {
        if (window.toggleTheme) window.toggleTheme();
      };
    });
  </script>
</body>
</html>
